<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCoins — Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand-500: #328AB5;
            --brand-600: #156EB5;
            --brand-700: #125C96;
            --brand-800: #0F4B79;
            --brand-900: #0D2B45;
            --accent-400: #33D8AF;
            --accent-500: #12C59A;
            --neutral-50:  #F6F8F8;
            --neutral-200: #DCE3E6;
            --neutral-400: #AAB4BC;
            --neutral-600: #64748B;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --r-xl:  0.75rem;
            --r-2xl: 1rem;
            --r-3xl: 1.5rem;
        }

        body {
            min-height: 100vh;
            background: #F6F8F8;
            font-family: 'Nunito Sans', sans-serif;
            color: #334155;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 260px;
            background: radial-gradient(ellipse at 50% 0%, rgba(21,110,181,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }


        /* ── Lock screen ── */
        #lockScreen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(7,20,35,0.92);
            backdrop-filter: blur(4px);
        }

        .lock-card {
            background: var(--brand-800);
            border: 1px solid rgba(127,196,255,0.2);
            border-radius: var(--r-3xl);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            animation: slideUp 0.35s var(--ease);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .lock-icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }

        .lock-card h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neutral-50);
            margin-bottom: 8px;
        }

        .lock-card p {
            color: var(--neutral-400);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .lock-card input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: var(--r-xl);
            color: #FFF;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
            letter-spacing: 4px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .lock-card input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.2);
        }

        .lock-card input.shake { animation: shake 0.4s ease; border-color: #EF4444; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-8px); }
            40%,80% { transform: translateX(8px); }
        }

        .lock-error {
            color: #FCA5A5;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            min-height: 22px;
        }

        /* ── Page content ── */
        #pageContent { display: none; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header { text-align: center; padding: 16px 0 10px; }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 700;
            color: var(--brand-900);
            letter-spacing: -0.02em;
        }

        .header .subtitle {
            color: var(--accent-400);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .mc-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(127,196,255,0.3), transparent);
            margin: 24px 0;
        }

        .star-btn {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            box-shadow: 0 4px 14px rgba(13,43,69,0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease);
        }
        .star-btn:hover { box-shadow: 0 6px 20px rgba(13,43,69,0.2); transform: scale(1.05); }
        .star-btn .bar { display: block; width: 20px; height: 2px; background: #156EB5; border-radius: 2px; margin: 3px 0; }

        .star-menu {
            position: fixed;
            top: 74px;
            right: 24px;
            z-index: 200;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.15);
            padding: 20px;
            width: 220px;
            animation: menuSlide 0.18s var(--ease);
        }
        .star-menu.hidden { display: none; }
        @keyframes menuSlide {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .star-menu-title { font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .role-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 14px; margin-bottom: 8px; background: #F6F8F8; border: 1px solid #DCE3E6; border-radius: var(--r-xl); font-family: 'Nunito Sans', sans-serif; font-size: 0.95rem; font-weight: 700; color: #334155; cursor: pointer; transition: all 0.15s var(--ease); text-align: left; }
        .role-btn:last-child { margin-bottom: 0; }
        .role-btn:hover { background: var(--brand-600); border-color: var(--brand-600); color: #FFF; }

        /* ── Cards ── */
        .card {
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.08);
            padding: 28px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-600);
            margin-bottom: 20px;
        }

        /* ── Type toggle ── */
        .type-toggle {
            display: flex;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            overflow: hidden;
        }

        .type-toggle input { display: none; }

        .type-toggle label {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.15s;
            color: #64748B;
        }

        #earn:checked   + label { background: rgba(18,197,154,0.2);  color: var(--accent-400); }
        #redeem:checked + label { background: rgba(239,68,68,0.15);  color: #FCA5A5; }

        /* ── Form grid ── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--neutral-400);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 14px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder, .form-group textarea::placeholder { color: #AAB4BC; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.15);
        }

        .form-group select option { background: #FFF; color: #1E293B; }

        /* ── Balance banner ── */
        .balance-banner {
            padding: 14px 18px;
            background: #EEF2F3;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .balance-banner.visible { display: flex; }

        .balance-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1E293B;
        }

        .balance-stats { display: flex; gap: 8px; flex-wrap: wrap; }

        .bal-chip {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .bal-current  { background: rgba(18,197,154,0.15);  color: var(--accent-400); }
        .bal-earned   { background: rgba(63,164,245,0.15);  color: #7FC4FF; }
        .bal-redeemed { background: rgba(239,68,68,0.12);   color: #FCA5A5; }

        /* ── Buttons ── */
        .btn {
            padding: 11px 22px;
            border: none;
            cursor: pointer;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: var(--r-xl);
            transition: all 0.2s var(--ease);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--brand-600);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.35);
        }

        .btn-primary:hover {
            background: var(--brand-700);
            box-shadow: 0 6px 20px rgba(21,110,181,0.5);
            transform: translateY(-1px);
        }

        .submit-wrap { display: flex; justify-content: flex-end; }

        .btn-sm-danger {
            padding: 5px 12px;
            background: rgba(239,68,68,0.15);
            color: #FCA5A5;
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--r-xl);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-sm-danger:hover { background: rgba(239,68,68,0.28); }

        /* ── Transaction table ── */
        .tx-table-wrap {
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }

        thead {
            background: #EEF2F3;
            border-bottom: 1px solid #DCE3E6;
        }

        th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.68rem;
            font-weight: 700;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        td {
            padding: 9px 12px;
            font-size: 0.78rem;
            border-bottom: 1px solid #EEF2F3;
            color: #334155;
            white-space: nowrap;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #F6F8F8; }

        .type-earn   { color: #0C8A6D; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .type-redeem { color: #DC2626; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .pts-earn    { color: #0C8A6D; font-weight: 700; }
        .pts-redeem  { color: #DC2626; font-weight: 700; }

        .empty-msg { text-align: center; padding: 28px; color: #AAB4BC; font-size: 0.9rem; }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-bar select,
        .filter-bar input[type="date"] {
            padding: 9px 14px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-bar select:focus,
        .filter-bar input[type="date"]:focus { border-color: var(--accent-500); }
        .filter-bar select option { background: #FFF; color: #1E293B; }

        .filter-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--neutral-400);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
            align-self: center;
        }

        /* ── Searchable select ── */
        .search-select { position: relative; }
        .ss-list {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: #fff;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            box-shadow: 0 8px 24px rgba(13,43,69,0.14);
            max-height: 220px;
            overflow-y: auto;
            z-index: 500;
        }
        .ss-option {
            padding: 8px 14px;
            font-size: 0.9rem;
            color: #334155;
            cursor: pointer;
            transition: background 0.1s;
        }
        .ss-option:hover { background: #EEF2F3; }
        .ss-empty { padding: 8px 14px; font-size: 0.85rem; color: #AAB4BC; }
        .filter-bar .search-select { flex: 1; min-width: 150px; }
        .filter-bar .search-select input[type="text"] {
            width: 100%;
            padding: 9px 14px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .filter-bar .search-select input[type="text"]:focus { border-color: var(--accent-500); }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: var(--r-xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.2);
            color: #F6F8F8;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            z-index: 999;
            transition: transform 0.3s var(--ease);
            white-space: nowrap;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        .footer { text-align: center; padding: 40px; color: #AAB4BC; font-size: 0.85rem; }
    </style>
</head>
<body>

<!-- Lock screen -->
<div id="lockScreen">
    <div class="lock-card">
        <span class="lock-icon">🔑</span>
        <h2>Staff Access</h2>
        <p>Enter your password to continue</p>
        <input type="password" id="pwdInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPassword()">
        <div class="lock-error" id="lockError"></div>
        <button class="btn btn-primary" style="width:100%;padding:13px" onclick="checkPassword()">Unlock Access</button>
    </div>
</div>

<!-- Hamburger nav button -->
<button class="star-btn" id="starBtn" onclick="toggleStarMenu(event)" title="Navigate">
    <span style="display:flex;flex-direction:column;align-items:center;">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </span>
</button>

<!-- Nav dropdown menu -->
<div class="star-menu hidden" id="starMenu">
    <div class="star-menu-title">Navigate</div>
    <button class="role-btn" onclick="window.location.href='index.html'">🏆 Leaderboard</button>
    <button class="role-btn" onclick="window.location.href='admin.html'">⚙️ Admin</button>
</div>

<!-- Page content -->
<div id="pageContent">
    <div class="container">
        <div class="header">
            <h1>📜 Staff Panel</h1>
        </div>

        <div class="mc-divider"></div>

        <!-- Sensei selector -->
        <div class="card" style="padding:10px 28px">
            <div class="form-group">
                <label>Sensei</label>
                <select id="txSensei" style="max-width:320px">
                    <option value="">-- Select Sensei --</option>
                </select>
            </div>
        </div>

        <!-- Entry form -->
        <div class="card" style="padding:10px 28px">
            <h3 style="margin-bottom:8px">Enter Coins Earned / Redeemed</h3>

            <!-- Type toggle -->
            <div class="form-grid" style="margin-bottom:0">
                <div class="form-group" style="grid-column:1/-1">
                    <label>Transaction Type</label>
                    <div class="type-toggle">
                        <input type="radio" id="earn" name="txType" value="earn" checked onchange="onTypeChange()">
                        <label for="earn">⬆ Earn Coins</label>
                        <input type="radio" id="redeem" name="txType" value="redeem" onchange="onTypeChange()">
                        <label for="redeem">⬇ Redeem Coins</label>
                    </div>
                </div>
            </div>

            <div style="height:16px"></div>

            <!-- Shared fields -->
            <div class="form-grid">
                <div class="form-group">
                    <label>Timestamp</label>
                    <input type="text" id="txTimestamp" readonly
                           style="background:#F6F8F8;color:#64748B;cursor:default;font-size:0.9rem">
                </div>
                <div class="form-group">
                    <label>Ninja</label>
                    <div class="search-select">
                        <input type="text" id="txStudentSearch" placeholder="-- Select Ninja --"
                               autocomplete="off"
                               onfocus="ssOpen('txStudent')"
                               oninput="ssInput('txStudent')"
                               onblur="ssBlur('txStudent')">
                        <div class="ss-list" id="txStudentList"></div>
                        <input type="hidden" id="txStudent">
                    </div>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="txDate">
                </div>
            </div>

            <!-- Earn-specific fields -->
            <div id="earnFields" class="form-grid">
                <div class="form-group">
                    <label>Activity</label>
                    <select id="txActivity" onchange="onActivityChange()">
                        <option value="">-- Select activity --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>CC Earned</label>
                    <input type="number" id="txPoints" placeholder="0" min="1">
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Activity Details</label>
                    <input type="text" id="txActivityDetails" placeholder="e.g. level completed, bonus challenge...">
                </div>
            </div>

            <!-- Redeem-specific fields -->
            <div id="redeemFields" class="form-grid" style="display:none">
                <div class="form-group">
                    <label>CC Redeemed</label>
                    <input type="number" id="txPointsRedeem" placeholder="0" min="1">
                </div>
                <div class="form-group" style="grid-column:1/-1">
                    <label>Item Bought</label>
                    <input type="text" id="txItemBought" placeholder="e.g. chocolate bar">
                </div>
            </div>

            <div class="balance-banner" id="balanceBanner">
                <div class="balance-name" id="balanceName"></div>
                <div class="balance-stats">
                    <span class="bal-chip bal-current"  id="balCurrent"></span>
                    <span class="bal-chip bal-earned"   id="balEarned"></span>
                    <span class="bal-chip bal-redeemed" id="balRedeemed"></span>
                </div>
            </div>

            <div class="submit-wrap">
                <button class="btn btn-primary" onclick="submitTransaction()">Save Transaction</button>
            </div>
        </div>

        <!-- Recent transactions -->
        <div class="card">
            <h3>Transactions</h3>

            <div class="filter-bar">
                <span class="filter-label">From</span>
                <input type="date" id="filterFrom" onchange="renderTransactions()">
                <span class="filter-label">To</span>
                <input type="date" id="filterTo" onchange="renderTransactions()">
                <div class="search-select">
                    <input type="text" id="filterStudentSearch" placeholder="All Ninjas"
                           autocomplete="off"
                           onfocus="ssOpen('filterStudent')"
                           oninput="ssInput('filterStudent')"
                           onblur="ssBlur('filterStudent')">
                    <div class="ss-list" id="filterStudentList"></div>
                    <input type="hidden" id="filterStudent">
                </div>
                <button class="btn btn-primary" onclick="refreshData()" style="padding:9px 16px;font-size:0.85rem">Search</button>
                <button class="btn btn-primary" onclick="clearFilters()" style="padding:9px 16px;font-size:0.85rem">Clear Filters</button>
            </div>

            <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
                <div style="display:flex;align-items:center;gap:10px;padding:12px 20px;background:#F0FDF8;border:1px solid rgba(18,197,154,0.3);border-radius:var(--r-xl)">
                    <span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#0FAE88">Total Earned</span>
                    <span id="sumEarned" style="font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:700;color:#0C8A6D">0</span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;padding:12px 20px;background:#FFF5F5;border:1px solid rgba(239,68,68,0.25);border-radius:var(--r-xl)">
                    <span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#DC2626">Total Redeemed</span>
                    <span id="sumRedeemed" style="font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:700;color:#DC2626">0</span>
                </div>
            </div>

            <div class="tx-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Ninja</th>
                            <th>Pts Earned</th>
                            <th>Pts Redeemed</th>
                            <th>Activity</th>
                            <th>Item Bought</th>
                            <th>Timestamp</th>
                            <th>Sensei</th>
                        </tr>
                    </thead>
                    <tbody id="txBody"></tbody>
                </table>
            </div>
        </div>

        <div class="footer">Stay sharp, keep tracking!</div>
    </div>
</div>

<div id="toast"></div>

<script>


    const PASSWORD = 'Milton321';
    function checkPassword() {
        const val = document.getElementById('pwdInput').value;
        if (val === PASSWORD) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('pageContent').style.display = 'block';
            initPage();
        } else {
            const input = document.getElementById('pwdInput');
            document.getElementById('lockError').textContent = 'Wrong password! Try again.';
            input.classList.add('shake');
            input.value = '';
            setTimeout(() => input.classList.remove('shake'), 500);
        }
    }

    // ── State ────────────────────────────────────────────────────────────────
    let sheetTransactions = [];
    let mongoTransactions = [];
    let allPlayers        = [];
    let senseis           = [];
    let activities        = [];
    let ninjas            = [];

    // ── API helper ───────────────────────────────────────────────────────────
    async function api(method, path, body) {
        const opts = { method, headers: {} };
        if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
        const r = await fetch(path, opts);
        if (!r.ok) throw new Error(await r.text());
        return r.json();
    }

    async function loadNinjas()     { try { ninjas     = await api('GET', '/api/ninjas?activeOnly=1'); } catch { ninjas     = []; } }
    async function loadSenseis()    { try { senseis    = await api('GET', '/api/senseis');    } catch { senseis    = []; } }
    async function loadActivities() { try { activities = await api('GET', '/api/activities'); } catch { activities = []; } }
    async function loadMongoTransactions() { try { mongoTransactions = await api('GET', '/api/transactions'); } catch { mongoTransactions = []; } }

    // ── Date helpers ─────────────────────────────────────────────────────────
    function toISODate(str) {
        if (!str) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;          // already ISO
        const p = str.split('/');
        if (p.length === 3) return `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        return '';
    }

    function fmtDate(str) {
        const iso = toISODate(str);
        if (!iso) return str;
        const [y, m, d] = iso.split('-');
        return `${parseInt(m)}/${parseInt(d)}/${y}`;
    }

    // ── Normalise a MongoDB transaction (handles both old and new field names) ─
    function normMongo(t) {
        return {
            timestamp:       t.timestamp       || t['Timestamp']         || '',
            ninja:           t.ninja           || t['Ninja Name']        || t['Ninja Nick Name'] || '',
            date:            t.date            || t['Date']              || '',
            sensei:          t.sensei          || t['Sensei']            || '',
            activity:        t.activityName    || t['Activity']          || '',
            pointsEarned:    parseInt(t.pointsEarned  ?? t['Points Earned'])  || 0,
            activityDetails: t.activityDetails || t['Activity Details']  || '',
            pointsRedeemed:  parseInt(t.pointsRedeemed ?? t['Points Redeemed']) || 0,
            itemBought:      t.itemBought      || t['Item Bought']       || '',
        };
    }

    // ── Rebuild player totals from all transactions ──────────────────────────
    function computeAllPlayers() {
        // Map both fullName and shortName → canonical fullName
        const ninjaCanonical = {};
        ninjas.forEach(n => {
            const canonical = (n.fullName || n.shortName || '').trim();
            if (!canonical) return;
            if (n.shortName) ninjaCanonical[n.shortName.trim().toLowerCase()] = canonical;
            if (n.fullName)  ninjaCanonical[n.fullName.trim().toLowerCase()]  = canonical;
        });

        const map = {};
        mongoTransactions.forEach(t => {
            const rawName = (t.ninja || t['Ninja Name'] || t['Ninja Nick Name'] || '').trim();
            if (!rawName) return;
            const canonical = ninjaCanonical[rawName.toLowerCase()] || rawName;
            if (!map[canonical]) map[canonical] = { name: canonical, earned: 0, redeemed: 0 };
            map[canonical].earned   += parseInt(t.pointsEarned  ?? t['Points Earned'])  || 0;
            map[canonical].redeemed += parseInt(t.pointsRedeemed ?? t['Points Redeemed']) || 0;
        });
        allPlayers = Object.values(map)
            .map(p => ({ name: p.name, earned: p.earned, redeemed: p.redeemed, current: p.earned - p.redeemed }))
            .sort((a, b) => a.name.localeCompare(b.name));
    }

    function getBalance(playerName) {
        const p = allPlayers.find(pl => pl.name === playerName);
        return p ? { current: p.current, earned: p.earned, redeemed: p.redeemed }
                 : { current: 0, earned: 0, redeemed: 0 };
    }

    // ── CSV / Google Sheets ──────────────────────────────────────────────────
    function parseCSV(text) {
        const lines = text.trim().split('\n');
        return lines.slice(1).map(line => {
            const cols = [];
            let cur = '', inQ = false;
            for (const c of line) {
                if (c === '"') { inQ = !inQ; continue; }
                if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
                cur += c;
            }
            cols.push(cur.trim());
            return cols;
        }).filter(cols => cols.length >= 3 && cols[2]);
    }

    // ── Searchable select ────────────────────────────────────────────────────
    const SS = {}; // prefix → [{value, label}]

    function ssRender(prefix, term) {
        const list = document.getElementById(prefix + 'List');
        const data = SS[prefix] || [];
        const q = term.trim().toLowerCase();
        const matches = q ? data.filter(o => o.label.toLowerCase().includes(q)) : data;
        list.innerHTML = matches.length
            ? matches.map(o =>
                `<div class="ss-option" data-val="${o.value.replace(/"/g,'&quot;')}" data-lbl="${o.label.replace(/"/g,'&quot;')}" onmousedown="ssPickEl(this,'${prefix}')">${o.label}</div>`
              ).join('')
            : '<div class="ss-empty">No matches</div>';
    }

    function ssOpen(prefix) {
        ssRender(prefix, '');
        document.getElementById(prefix + 'List').style.display = 'block';
    }

    function ssInput(prefix) {
        const term = document.getElementById(prefix + 'Search').value;
        ssRender(prefix, term);
        document.getElementById(prefix + 'List').style.display = 'block';
    }

    function ssPickEl(el, prefix) {
        document.getElementById(prefix).value          = el.dataset.val;
        document.getElementById(prefix + 'Search').value = el.dataset.lbl;
        document.getElementById(prefix + 'List').style.display = 'none';
        if (prefix === 'txStudent')     onStudentChange();
        if (prefix === 'filterStudent') renderTransactions();
    }

    function ssBlur(prefix) {
        setTimeout(() => {
            document.getElementById(prefix + 'List').style.display = 'none';
            const val  = document.getElementById(prefix).value;
            const data = SS[prefix] || [];
            const opt  = data.find(o => o.value === val);
            document.getElementById(prefix + 'Search').value = opt ? opt.label : '';
        }, 150);
    }

    function ssClear(prefix) {
        document.getElementById(prefix).value            = '';
        document.getElementById(prefix + 'Search').value = '';
        document.getElementById(prefix + 'List').style.display = 'none';
    }

    // ── UI helpers ───────────────────────────────────────────────────────────
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    function populateDropdowns() {
        const type = document.querySelector('input[name="txType"]:checked').value;

        // Ninja searchable select
        const prevNinja = document.getElementById('txStudent').value;
        SS['txStudent'] = ninjas
            .filter(n => (n.status || 'Active').toLowerCase() !== 'inactive')
            .sort((a, b) => (a.fullName || '').localeCompare(b.fullName || ''))
            .map(n => ({ value: n.fullName, label: n.fullName }));
        if (!prevNinja) document.getElementById('txStudentSearch').value = '';

        const senseiSel = document.getElementById('txSensei');
        const prevS = senseiSel.value;
        senseiSel.innerHTML = '<option value="">-- Select Sensei --</option>' +
            senseis.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        if (prevS) senseiSel.value = prevS;

        const actSel = document.getElementById('txActivity');
        const prevA  = actSel.value;
        actSel.innerHTML = '<option value="">-- Select activity --</option>' +
            activities.map(a => `<option value="${a._id}" data-pts="${a.coins}">${a.name} (+${a.coins})</option>`).join('');
        if (prevA) actSel.value = prevA;

        document.getElementById('earnFields').style.display   = type === 'earn'   ? '' : 'none';
        document.getElementById('redeemFields').style.display = type === 'redeem' ? '' : 'none';

        // Filter-bar ninja searchable select
        SS['filterStudent'] = [{ value: '', label: 'All Ninjas' },
            ...allPlayers.map(p => ({ value: p.name, label: p.name }))];
    }

    function onTypeChange() { populateDropdowns(); onActivityChange(); }

    function onStudentChange() {
        const name   = document.getElementById('txStudent').value;
        const banner = document.getElementById('balanceBanner');
        if (!name) { banner.classList.remove('visible'); return; }
        const bal = getBalance(name);
        banner.classList.add('visible');
        document.getElementById('balanceName').textContent  = '> ' + name;
        document.getElementById('balCurrent').textContent   = 'Balance: '  + bal.current;
        document.getElementById('balEarned').textContent    = 'Earned: '   + bal.earned;
        document.getElementById('balRedeemed').textContent  = 'Redeemed: ' + bal.redeemed;
    }

    function onActivityChange() {
        const sel  = document.getElementById('txActivity');
        const opt  = sel.options[sel.selectedIndex];
        const pts  = opt?.dataset?.pts;
        const type = document.querySelector('input[name="txType"]:checked').value;
        if (pts && type === 'earn') document.getElementById('txPoints').value = pts;
    }

    // ── Transaction submission → MongoDB ─────────────────────────────────────
    async function submitTransaction() {
        const type       = document.querySelector('input[name="txType"]:checked').value;
        const playerName = document.getElementById('txStudent').value;
        const date       = document.getElementById('txDate').value;
        const sensei     = document.getElementById('txSensei').value;
        const timestamp  = document.getElementById('txTimestamp').value;

        if (!playerName) { toast('Select a Ninja!'); return; }
        if (!date)       { toast('Enter a date!'); return; }

        let txData;

        if (type === 'earn') {
            const actSel          = document.getElementById('txActivity');
            const actId           = actSel.value;
            const points          = parseInt(document.getElementById('txPoints').value, 10);
            const activityDetails = document.getElementById('txActivityDetails').value.trim();

            if (!actId)                { toast('Select an activity!'); return; }
            if (!points || points < 1) { toast('Enter a valid CC Earned amount!'); return; }

            const activity = activities.find(a => a._id === actId);
            txData = {
                type, timestamp, ninja: playerName, date, sensei,
                activityName:    activity?.name || '',
                pointsEarned:    points,
                activityDetails,
                pointsRedeemed:  0,
                itemBought:      '',
            };
        } else {
            const points     = parseInt(document.getElementById('txPointsRedeem').value, 10);
            const itemBought = document.getElementById('txItemBought').value.trim();

            if (!points || points < 1) { toast('Enter a valid CC Redeemed amount!'); return; }

            const bal = getBalance(playerName);
            if (points > bal.current) { toast(`Not enough coins! Balance: ${bal.current}`); return; }

            txData = {
                type, timestamp, ninja: playerName, date, sensei,
                activityName:    '',
                pointsEarned:    0,
                activityDetails: '',
                pointsRedeemed:  points,
                itemBought,
            };
        }

        try {
            const saved = await api('POST', '/api/transactions', txData);
            mongoTransactions.unshift(saved);
            computeAllPlayers();

            if (type === 'earn') {
                document.getElementById('txActivity').value        = '';
                document.getElementById('txPoints').value          = '';
                document.getElementById('txActivityDetails').value = '';
                toast(`+${txData.pointsEarned} coins earned!`);
            } else {
                document.getElementById('txPointsRedeem').value = '';
                document.getElementById('txItemBought').value   = '';
                toast(`${txData.pointsRedeemed} coins redeemed!`);
            }

            ssClear('txStudent');
            document.getElementById('txSensei').value  = '';
            document.getElementById('balanceBanner').classList.remove('visible');
            document.getElementById('earn').checked = true;
            onTypeChange();
            renderTransactions();
        } catch { toast('Error saving transaction!'); }
    }

    // ── Transaction table ─────────────────────────────────────────────────────
    function renderTransactions() {
        const filterPlayer = document.getElementById('filterStudent').value;
        const filterFrom   = document.getElementById('filterFrom').value;
        const filterTo     = document.getElementById('filterTo').value;

        const allTx = [
            ...sheetTransactions,
            ...mongoTransactions.map(normMongo),
        ].sort((a, b) => {
            const da = toISODate(a.date); const db = toISODate(b.date);
            return db.localeCompare(da);
        });

        let rows = allTx.filter(t => {
            if (filterPlayer && t.ninja !== filterPlayer) return false;
            const iso = toISODate(t.date);
            if (filterFrom && iso && iso < filterFrom) return false;
            if (filterTo   && iso && iso > filterTo)   return false;
            return true;
        });

        document.getElementById('sumEarned').textContent   = rows.reduce((s, t) => s + (t.pointsEarned   || 0), 0);
        document.getElementById('sumRedeemed').textContent = rows.reduce((s, t) => s + (t.pointsRedeemed || 0), 0);

        const tbody = document.getElementById('txBody');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-msg">No transactions found...</td></tr>';
            return;
        }

        tbody.innerHTML = rows.slice(0, 200).map(t => `<tr>
            <td>${fmtDate(t.date)}</td>
            <td style="font-weight:700">${t.ninja}</td>
            <td class="${t.pointsEarned   ? 'pts-earn'   : ''}">${t.pointsEarned   || '--'}</td>
            <td class="${t.pointsRedeemed ? 'pts-redeem' : ''}">${t.pointsRedeemed || '--'}</td>
            <td>${t.activity   || '--'}</td>
            <td style="color:#64748B;font-size:0.9rem">${t.itemBought || '--'}</td>
            <td style="color:#64748B;font-size:0.85rem">${t.timestamp}</td>
            <td>${t.sensei}</td>
        </tr>`).join('');
    }

    async function refreshData() {
        await loadMongoTransactions();
        computeAllPlayers();
        renderTransactions();
    }

    function clearFilters() {
        document.getElementById('filterFrom').value = '';
        document.getElementById('filterTo').value   = '';
        ssClear('filterStudent');
        renderTransactions();
    }

    function refreshTimestamp() {
        const el = document.getElementById('txTimestamp');
        if (el) el.value = new Date().toLocaleString('en-US', {
            month: 'numeric', day: 'numeric', year: 'numeric',
            hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
        });
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function initPage() {
        document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
        refreshTimestamp();
        setInterval(refreshTimestamp, 1000);

        document.getElementById('txStudent').innerHTML = '<option value="">Loading...</option>';

        await Promise.all([
            loadMongoTransactions(),
            loadNinjas(),
            loadSenseis(),
            loadActivities(),
        ]);

        computeAllPlayers();

        // Default filter: last 7 days from today
        const today   = new Date();
        const fmt     = dt => dt.toISOString().split('T')[0];
        const from7   = new Date(today);
        from7.setDate(today.getDate() - 6);
        document.getElementById('filterTo').value   = fmt(today);
        document.getElementById('filterFrom').value = fmt(from7);

        populateDropdowns();
        renderTransactions();
    }

    function toggleStarMenu(e) {
        e.stopPropagation();
        document.getElementById('starMenu').classList.toggle('hidden');
    }
    document.addEventListener('click', e => {
        const menu = document.getElementById('starMenu');
        if (menu && !menu.contains(e.target) && e.target !== document.getElementById('starBtn'))
            menu.classList.add('hidden');
    });

</script>
</body>
</html>
