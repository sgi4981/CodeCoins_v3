<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCoins — Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand-500: #328AB5;
            --brand-600: #156EB5;
            --brand-700: #125C96;
            --brand-800: #0F4B79;
            --brand-900: #0D2B45;
            --accent-400: #33D8AF;
            --accent-500: #12C59A;
            --accent-600: #0FAE88;
            --neutral-50:  #F6F8F8;
            --neutral-200: #DCE3E6;
            --neutral-400: #AAB4BC;
            --neutral-600: #64748B;
            --shadow-hero:   0 20px 40px rgba(0,0,0,0.25);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --r-xl:  0.75rem;
            --r-2xl: 1rem;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #F6F8F8;
            font-family: 'Nunito Sans', sans-serif;
            color: #334155;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 260px;
            background: radial-gradient(ellipse at 50% 0%, rgba(21,110,181,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        #floating-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .float-icon {
            position: absolute;
            animation: floatUp linear infinite;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh)  translateX(0px)   rotate(0deg);   opacity: 0; }
            8%   { opacity: 1; }
            25%  { transform: translateY(72vh)   translateX(18px)  rotate(90deg); }
            50%  { transform: translateY(48vh)   translateX(-14px) rotate(180deg); }
            75%  { transform: translateY(24vh)   translateX(16px)  rotate(270deg); }
            92%  { opacity: 0.35; }
            100% { transform: translateY(-120px) translateX(0px)   rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1100px;
            height: 100vh;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header { text-align: center; padding: 48px 0 20px; }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2rem, 4.5vw, 3.2rem);
            font-weight: 700;
            color: var(--brand-900);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header .subtitle {
            color: var(--accent-600);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 12px;
        }

        /* ── Divider ── */
        .mc-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(127,196,255,0.3), transparent);
            margin: 24px 0;
        }

        /* ── Fun Fact Bar ── */
        .fun-fact-bar {
            background: #7ed957;
            border: 1.5px solid #66be3e;
            border-left: 4px solid #0D2B45;
            border-radius: var(--r-xl);
            padding: 10px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 10px rgba(21,110,181,0.07);
        }
        .fun-fact-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0D2B45;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .fun-fact-text {
            font-size: 0.82rem;
            color: #0D2B45;
            font-style: italic;
            line-height: 1.4;
        }

        /* ── Nav ── */
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .nav a {
            padding: 10px 24px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            color: #64748B;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            box-shadow: 0 1px 3px rgba(13,43,69,0.06);
            transition: all 0.2s var(--ease);
        }

        .nav a.active, .nav a:hover {
            background: var(--brand-600);
            border-color: var(--brand-500);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.4);
        }

        /* ── Search ── */
        /* ── Two-column layout ── */
        .split-layout {
            display: flex;
            gap: 24px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .leaderboard-side {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding-right: 4px;
        }

        .image-side {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .image-label {
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #000000;
            margin-bottom: 2px;
            text-align: center;
        }

        .image-window {
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(13,43,69,0.10);
            overflow: hidden;
        }

        .image-window img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            .container { height: auto; overflow: visible; }
            .split-layout { flex-direction: column; overflow: visible; }
            .leaderboard-side { overflow-y: visible; }
            .image-side { width: 100%; }
        }

        .search-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .search-wrap input {
            flex: 1;
            padding: 12px 18px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 1px 3px rgba(13,43,69,0.06);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-wrap input::placeholder { color: #AAB4BC; }
        .search-wrap input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.2);
        }

        .btn {
            padding: 12px 22px;
            border: none;
            cursor: pointer;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: var(--r-xl);
            transition: all 0.2s var(--ease);
        }

        .btn-primary {
            background: var(--brand-600);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.35);
        }

        .btn-primary:hover {
            background: var(--brand-700);
            box-shadow: 0 6px 20px rgba(21,110,181,0.5);
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(0); }


        /* ── Table ── */
        .table-wrap {
            background: #156EB5;
            border: 2px solid #156EB5;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.08);
            overflow: clip;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; }

        thead {
            background: #0F4B79;
        }

        th {
            padding: 16px 20px;
            position: sticky;
            top: 0;
            background: #0F4B79;
            z-index: 10;
            box-shadow: 0 1px 0 rgba(255,255,255,0.15);
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1rem;
            color: #FFFFFF;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.08); }

        tbody tr.search-hit {
            background: rgba(255,255,255,0.15) !important;
            box-shadow: inset 4px 0 0 var(--accent-400);
        }

        /* rank */
        .rank { text-align: center; width: 72px; font-size: 1.3rem; }
        .rank-1 { color: #FBBF24; filter: drop-shadow(0 0 8px rgba(251,191,36,0.5)); animation: goldBounce 1.5s ease-in-out infinite; }
        .rank-2 { color: #CBD5E1; }
        .rank-3 { color: #D97706; }
        .rank-num { font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.5); }

        @keyframes goldBounce {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-4px); }
        }

        /* badges */
        .badge {
            display: inline-block;
            padding: 7px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-current  { background: rgba(255,255,255,0.18); color: #FFFFFF; }
        .badge-earned   { background: rgba(255,255,255,0.18); color: #FFFFFF; }
        .badge-redeemed { background: rgba(255,255,255,0.18); color: #FFFFFF; }
        .badge-earned   .arr { color: #4ADE80; }
        .badge-redeemed .arr { color: #FF6B6B; }

        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: #AAB4BC;
            font-size: 0.95rem;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: #AAB4BC;
            font-size: 0.85rem;
        }

        /* ── Star access button ── */
        .star-btn {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            box-shadow: 0 4px 14px rgba(13,43,69,0.12);
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease);
        }

        .star-btn:hover {
            box-shadow: 0 6px 20px rgba(13,43,69,0.2);
            transform: scale(1.05);
        }
        .star-btn .bar {
            display: block;
            width: 20px;
            height: 2px;
            background: #156EB5;
            border-radius: 2px;
            margin: 3px 0;
            transition: background 0.2s;
        }

        /* ── Star dropdown menu ── */
        .star-menu {
            position: fixed;
            top: 74px;
            right: 24px;
            z-index: 200;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.15);
            padding: 20px;
            width: 260px;
            animation: menuSlide 0.18s var(--ease);
        }

        .star-menu.hidden { display: none; }

        @keyframes menuSlide {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        .star-menu-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .role-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s var(--ease);
            text-align: left;
        }

        .role-btn:last-child { margin-bottom: 0; }

        .role-btn:hover {
            background: var(--brand-600);
            border-color: var(--brand-600);
            color: #FFF;
        }

        .star-pwd-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--brand-900);
            margin-bottom: 12px;
        }

        .star-pwd-input {
            width: 100%;
            padding: 10px 14px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            margin-bottom: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .star-pwd-input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.18);
        }

        .star-pwd-input.shake { animation: shake 0.35s ease; border-color: #EF4444; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-6px); }
            40%,80% { transform: translateX(6px); }
        }

        .star-error {
            color: #DC2626;
            font-size: 0.82rem;
            font-weight: 600;
            min-height: 18px;
            margin-bottom: 10px;
        }

        .star-actions {
            display: flex;
            gap: 8px;
        }

        .star-back-btn {
            padding: 9px 14px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748B;
            cursor: pointer;
            transition: all 0.15s;
        }

        .star-back-btn:hover { background: #EEF2F3; }
    </style>
</head>
<body>
<div id="floating-bg"></div>

<!-- Star access button -->
<button class="star-btn" id="starBtn" onclick="toggleStarMenu(event)" title="Admin / Staff access">
    <span style="display:flex;flex-direction:column;align-items:center;">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </span>
</button>

<!-- Star dropdown menu -->
<div class="star-menu hidden" id="starMenu">
    <!-- Step 1: choose role -->
    <div id="starStep1">
        <div class="star-menu-title">Access Panel</div>
        <button class="role-btn" onclick="selectRole('admin')">⚙️ Admin</button>
        <button class="role-btn" onclick="selectRole('staff')">📜 Staff</button>
    </div>
    <!-- Step 2: enter password -->
    <div id="starStep2" class="hidden">
        <div class="star-pwd-label" id="starRoleLabel"></div>
        <input class="star-pwd-input" type="password" id="starPwd" placeholder="Password"
               onkeydown="if(event.key==='Enter') submitStarPwd()">
        <div class="star-error" id="starError"></div>
        <div class="star-actions">
            <button class="star-back-btn" onclick="backToRoles()">← Back</button>
            <button class="btn btn-primary" style="flex:1;padding:9px" onclick="submitStarPwd()">Unlock</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>⛏ CodeCoins ⛏</h1>
        <div class="subtitle">Player Leaderboard</div>
    </div>

    <div class="mc-divider"></div>

    <div class="fun-fact-bar">
        <span class="fun-fact-label">💡 Fun Fact</span>
        <span class="fun-fact-text" id="funFactText"></span>
    </div>

    <div class="split-layout">
        <div class="leaderboard-side">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="text-align:center">Rank</th>
                            <th>Player Name</th>
                            <th>💰 Coins</th>
                            <th>⬆ Total Earned</th>
                            <th>⬇ Total Redeemed</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
            </div>
        </div>

        <div class="image-side">
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Search player name..." oninput="renderLeaderboard()">
                <button class="btn btn-primary" onclick="renderLeaderboard()">Search</button>
            </div>

            <div>
                <div class="image-label">Featured Background</div>
                <div class="image-window">
                    <img src="Assets/BackgroundAssets/MahadAreeb1.png" alt="CodeCoins">
                </div>
            </div>
        </div>
    </div>

    <div class="footer">Keep mining those CodeCoins!</div>
</div>

<script>
    async function loadFloatIcons() {
        try {
            const res = await fetch('Assets/FloatingIconAssets/');
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const imgs = [...doc.querySelectorAll('a[href]')]
                .map(a => a.getAttribute('href'))
                .filter(h => /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(h))
                .map(h => 'Assets/FloatingIconAssets/' + h.replace(/^.*\//, ''));
            if (imgs.length) return imgs;
        } catch (_) {}
        return ['Assets/FloatingIconAssets/Mahad1.png', 'Assets/FloatingIconAssets/Mahad2.png'];
    }
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQAJRBdnj_AmnaQttasDtUlTHoEzywKUZXn5mRyTll5FGOrpwZg5u6GKO-rrDJ_ihEihKO_43xV3vlJ/pub?output=csv';

    let sheetRows = [];

    async function createFloaters() {
        const icons = await loadFloatIcons();
        const bg = document.getElementById('floating-bg');
        for (let i = 0; i < 30; i++) {
            const el = document.createElement('img');
            el.className = 'float-icon';
            el.src = icons[Math.floor(Math.random() * icons.length)];
            el.alt = '';
            el.style.cssText = `
                left: ${Math.random() * 100}vw;
                width: ${Math.random() * 24 + 32}px;
                animation-duration: ${Math.random() * 20 + 32}s;
                animation-delay: ${Math.random() * 22}s;
                opacity: ${Math.random() * 0.28 + 0.1};
            `;
            bg.appendChild(el);
        }
    }

    function parseCSV(text) {
        const lines = text.trim().split('\n');
        return lines.slice(1).map(line => {
            const cols = [];
            let cur = '', inQ = false;
            for (const c of line) {
                if (c === '"') { inQ = !inQ; continue; }
                if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
                cur += c;
            }
            cols.push(cur.trim());
            return cols;
        }).filter(cols => cols.length >= 5 && cols[1]);
    }

    async function fetchLeaderboard() {
        document.getElementById('leaderboardBody').innerHTML =
            `<tr><td colspan="5" class="no-data">Loading leaderboard...</td></tr>`;
        try {
            const res  = await fetch(SHEET_CSV);
            const text = await res.text();
            sheetRows  = parseCSV(text).map(cols => ({
                rank:     parseInt(cols[0].replace('#', '')) || 0,
                name:     cols[1],
                current:  parseInt(cols[2]) || 0,
                earned:   parseInt(cols[3]) || 0,
                redeemed: parseInt(cols[4]) || 0,
            }));
            renderLeaderboard();
        } catch {
            document.getElementById('leaderboardBody').innerHTML =
                `<tr><td colspan="5" class="no-data">Could not load data. Check your connection.</td></tr>`;
        }
    }

    function renderLeaderboard() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        if (!sheetRows.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="no-data">No players found...</td></tr>`;
            return;
        }

        sheetRows.forEach(r => {
            const isHit = query && r.name.toLowerCase().includes(query);
            const rankDisplay =
                r.rank === 1 ? `<span class="rank rank-1">🥇</span>` :
                r.rank === 2 ? `<span class="rank rank-2">🥈</span>` :
                r.rank === 3 ? `<span class="rank rank-3">🥉</span>` :
                `<span class="rank rank-num">#${r.rank}</span>`;
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="${isHit ? 'search-hit' : ''}">
                    <td style="text-align:center">${rankDisplay}</td>
                    <td style="font-size:21px;text-shadow:1px 1px #000">${r.name}</td>
                    <td><span class="badge badge-current">💰 ${r.current}</span></td>
                    <td><span class="badge badge-earned"><span class="arr">⬆</span> ${r.earned}</span></td>
                    <td><span class="badge badge-redeemed"><span class="arr">⬇</span> ${r.redeemed}</span></td>
                </tr>`);
        });

        if (query) {
            const firstHit = tbody.querySelector('.search-hit');
            if (firstHit) firstHit.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

    }

    createFloaters();
    fetchLeaderboard();

    /* ── Daily coding fun fact ── */
    (function() {
        const facts = [
            "The first computer bug was an actual bug — a moth found trapped in a Harvard Mark II computer in 1947.",
            "Python was named after Monty Python's Flying Circus, not the snake.",
            "The first programming language was created by Ada Lovelace in the 1840s — over 100 years before computers existed.",
            "There are over 700 programming languages in existence today.",
            "The average programmer writes around 10–12 lines of production code per day.",
            "JavaScript was created in just 10 days by Brendan Eich in 1995.",
            "About 70% of all coding errors are made by tired programmers.",
            "The term 'debugging' became popular after Grace Hopper removed that moth from the Mark II.",
            "HTML is not technically a programming language — it's a markup language.",
            "The first computer game, Spacewar!, was created in 1962 at MIT.",
            "Linux powers over 96% of the world's top 1 million web servers.",
            "Git was created by Linus Torvalds in just two weeks in 2005.",
            "A typical smartphone today has more computing power than all of NASA had in 1969.",
            "The QWERTY keyboard layout was designed to slow typists down to prevent typewriter jams.",
            "Stack Overflow is visited by over 50 million developers every month.",
            "The 'Hello, World!' program dates back to a 1978 book on the C programming language.",
            "Binary code uses only two digits — 0 and 1 — to represent all data.",
            "The word 'pixel' is a combination of 'picture' and 'element'.",
            "Coding was once considered a clerical job, similar to typing.",
            "Amazon deploys new code every 11.7 seconds on average.",
            "The first 1GB hard drive, released in 1980, weighed over 500 pounds and cost $40,000.",
            "An estimated 4 billion people use software you didn't realize was code — like traffic lights.",
            "Over 90% of the world's currency exists only as digital data, not physical money.",
            "The @ symbol used in email addresses dates back to medieval accounting.",
            "NASA's Apollo 11 guidance computer had less memory than a modern greeting card.",
            "The world's first website, created by Tim Berners-Lee in 1991, is still online.",
            "Rubber duck debugging — explaining your code to a rubber duck — actually works.",
            "A computer would need to run for thousands of years to crack 256-bit encryption.",
            "The first computer mouse was made of wood.",
            "Coding is now a required subject in schools in over 20 countries worldwide.",
            "The word 'computer' originally referred to a person who performed calculations.",
            "Wi-Fi doesn't actually stand for 'Wireless Fidelity' — it's just a brand name.",

        const d = new Date();
        const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
        document.getElementById('funFactText').textContent = facts[dayOfYear % facts.length];
    })();

    /* ── Star access menu ── */
    let starRole = '';

    function toggleStarMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('starMenu');
        const isHidden = menu.classList.contains('hidden');
        if (isHidden) {
            menu.classList.remove('hidden');
            showStarStep1();
        } else {
            menu.classList.add('hidden');
        }
    }

    function showStarStep1() {
        document.getElementById('starStep1').classList.remove('hidden');
        document.getElementById('starStep2').classList.add('hidden');
        document.getElementById('starError').textContent = '';
        document.getElementById('starPwd').value = '';
    }

    function selectRole(role) {
        starRole = role;
        document.getElementById('starRoleLabel').textContent =
            role === 'admin' ? '⚙️ Admin Password' : '📜 Staff Password';
        document.getElementById('starStep1').classList.add('hidden');
        document.getElementById('starStep2').classList.remove('hidden');
        setTimeout(() => document.getElementById('starPwd').focus(), 50);
    }

    function backToRoles() { showStarStep1(); }

    function submitStarPwd() {
        const pwd = document.getElementById('starPwd').value;
        if (pwd === 'Milton123') {
            window.location.href = starRole === 'admin' ? 'admin.html' : 'staff.html';
        } else {
            document.getElementById('starError').textContent = 'Wrong password. Try again.';
            const input = document.getElementById('starPwd');
            input.classList.add('shake');
            input.value = '';
            setTimeout(() => { input.classList.remove('shake'); input.focus(); }, 380);
        }
    }

    document.addEventListener('click', e => {
        const menu = document.getElementById('starMenu');
        const btn  = document.getElementById('starBtn');
        if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.add('hidden');
        }
    });
</script>
</body>
