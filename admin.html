<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCoins — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand-500: #328AB5;
            --brand-600: #156EB5;
            --brand-700: #125C96;
            --brand-800: #0F4B79;
            --brand-900: #0D2B45;
            --accent-400: #33D8AF;
            --accent-500: #12C59A;
            --neutral-50:  #F6F8F8;
            --neutral-200: #DCE3E6;
            --neutral-400: #AAB4BC;
            --neutral-600: #64748B;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --r-xl:  0.75rem;
            --r-2xl: 1rem;
            --r-3xl: 1.5rem;
        }

        body {
            min-height: 100vh;
            background: #F6F8F8;
            font-family: 'Nunito Sans', sans-serif;
            color: #334155;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 260px;
            background: radial-gradient(ellipse at 50% 0%, rgba(21,110,181,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }


        /* ── Lock screen ── */
        #lockScreen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(7,20,35,0.92);
            backdrop-filter: blur(4px);
        }

        .lock-card {
            background: var(--brand-800);
            border: 1px solid rgba(127,196,255,0.2);
            border-radius: var(--r-3xl);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            animation: slideUp 0.35s var(--ease);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .lock-icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }

        .lock-card h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neutral-50);
            margin-bottom: 8px;
        }

        .lock-card p {
            color: var(--neutral-400);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .lock-card input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: var(--r-xl);
            color: #FFF;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
            letter-spacing: 4px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .lock-card input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.2);
        }

        .lock-card input.shake { animation: shake 0.4s ease; border-color: #EF4444; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-8px); }
            40%,80% { transform: translateX(8px); }
        }

        .lock-error {
            color: #FCA5A5;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            min-height: 22px;
        }

        /* ── Page content ── */
        #pageContent { display: none; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header { text-align: center; padding: 48px 0 20px; }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 700;
            color: var(--brand-900);
            letter-spacing: -0.02em;
        }

        .header .subtitle {
            color: var(--accent-400);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .mc-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(127,196,255,0.3), transparent);
            margin: 24px 0;
        }

        /* ── Nav ── */
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .nav a {
            padding: 10px 24px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            color: #64748B;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            box-shadow: 0 1px 3px rgba(13,43,69,0.06);
            transition: all 0.2s var(--ease);
        }

        .nav a.active, .nav a:hover {
            background: var(--brand-600);
            border-color: var(--brand-500);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.4);
        }

        /* ── Tabs ── */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

        .tab-btn {
            padding: 10px 22px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #64748B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 1px 3px rgba(13,43,69,0.06);
            transition: all 0.2s var(--ease);
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--brand-600);
            border-color: var(--brand-500);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.4);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Cards ── */
        .card {
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.08);
            padding: 28px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-600);
            margin-bottom: 20px;
        }

        /* ── Forms ── */
        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--neutral-400);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-group input, .form-group select {
            padding: 10px 14px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder { color: #AAB4BC; }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.15);
        }

        .form-group select option { background: #FFF; color: #1E293B; }

        .btn {
            padding: 11px 22px;
            border: none;
            cursor: pointer;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: var(--r-xl);
            transition: all 0.2s var(--ease);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--brand-600);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.35);
        }

        .btn-primary:hover {
            background: var(--brand-700);
            box-shadow: 0 6px 20px rgba(21,110,181,0.5);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(239,68,68,0.15);
            color: #FCA5A5;
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--r-xl);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 7px 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-danger:hover {
            background: rgba(239,68,68,0.28);
            border-color: rgba(239,68,68,0.5);
        }

        /* ── Item lists ── */
        .item-list { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }

        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            transition: background 0.15s;
        }

        .item-row:hover { background: #EEF2F3; }

        .item-info { display: flex; flex-direction: column; gap: 3px; }
        .item-name { font-size: 1rem; font-weight: 600; color: #1E293B; }
        .item-sub  { font-size: 0.85rem; color: #64748B; }

        .points-pill {
            padding: 4px 12px;
            background: rgba(18,197,154,0.15);
            border: 1px solid rgba(18,197,154,0.25);
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-600);
            margin-right: 12px;
            white-space: nowrap;
        }

        .empty-msg {
            text-align: center;
            padding: 24px;
            color: #AAB4BC;
            font-size: 0.9rem;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: var(--r-xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.2);
            color: #F6F8F8;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            z-index: 999;
            transition: transform 0.3s var(--ease);
            white-space: nowrap;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        .footer {
            text-align: center;
            padding: 40px;
            color: #AAB4BC;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<!-- Lock screen -->
<div id="lockScreen">
    <div class="lock-card">
        <span class="lock-icon">🔐</span>
        <h2>Admin Access</h2>
        <p>Enter your password to continue</p>
        <input type="password" id="pwdInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPassword()">
        <div class="lock-error" id="lockError"></div>
        <button class="btn btn-primary" style="width:100%;padding:13px" onclick="checkPassword()">Unlock Access</button>
    </div>
</div>

<!-- Page content -->
<div id="pageContent">
    <div class="container">
        <div class="header">
            <h1>⚙ Admin Panel</h1>
            <div class="subtitle">*** Reference Data Management ***</div>
        </div>

        <div class="mc-divider"></div>

        <nav class="nav">
            <a href="index.html">🏆 Leaderboard</a>
            <a href="admin.html" class="active">⚙ Admin</a>
            <a href="staff.html">📜 Staff</a>
        </nav>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('students', this)">🥷 Ninjas</button>
            <button class="tab-btn" onclick="switchTab('senseis', this)">🥋 Senseis</button>
            <button class="tab-btn" onclick="switchTab('activities', this)">⚡ Activities</button>
        </div>

        <!-- Ninjas -->
        <div id="tab-students" class="tab-panel active">
            <div class="card">
                <h3>Add Ninja</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="newNinjaFullName" placeholder="e.g. Alex Carter">
                    </div>
                    <div class="form-group">
                        <label>Short Name</label>
                        <input type="text" id="newNinjaShortName" placeholder="e.g. Alex C">
                    </div>
                    <button class="btn btn-primary" onclick="addNinja()">+ Add Ninja</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
                    <h3 style="margin-bottom:0">All Ninjas</h3>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                        <input type="text" id="ninjaSearch" placeholder="Search ninjas..." oninput="renderNinjas()"
                               style="padding:8px 14px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color .2s,box-shadow .2s">
                        <div style="display:flex;gap:4px">
                            <button id="filterAll"      onclick="setNinjaFilter('All')"      style="padding:8px 14px;font-size:0.85rem;font-weight:700;border-radius:var(--r-xl);cursor:pointer;font-family:'Nunito Sans',sans-serif;border:1px solid var(--brand-500);background:var(--brand-600);color:#fff;transition:all .15s">All</button>
                            <button id="filterActive"   onclick="setNinjaFilter('Active')"   style="padding:8px 14px;font-size:0.85rem;font-weight:700;border-radius:var(--r-xl);cursor:pointer;font-family:'Nunito Sans',sans-serif;border:1px solid #DCE3E6;background:#fff;color:#64748B;transition:all .15s">Active</button>
                            <button id="filterInactive" onclick="setNinjaFilter('Inactive')" style="padding:8px 14px;font-size:0.85rem;font-weight:700;border-radius:var(--r-xl);cursor:pointer;font-family:'Nunito Sans',sans-serif;border:1px solid #DCE3E6;background:#fff;color:#64748B;transition:all .15s">Inactive</button>
                        </div>
                        <button class="btn btn-primary" onclick="exportNinjas()" style="padding:8px 16px;font-size:0.85rem">💾 Save Changes</button>
                    </div>
                </div>
                <div class="item-list" id="ninjaList"></div>
            </div>
        </div>

        <!-- Senseis -->
        <div id="tab-senseis" class="tab-panel">
            <div class="card">
                <h3>Add Sensei</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Sensei Name</label>
                        <input type="text" id="newSenseiName" placeholder="e.g. Sensei Rivera">
                    </div>
                    <button class="btn btn-primary" onclick="addSensei()">+ Add Sensei</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
                    <h3 style="margin-bottom:0">All Senseis</h3>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                        <input type="text" id="senseiSearch" placeholder="Search senseis..." oninput="renderSenseis()"
                               style="padding:8px 14px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color .2s,box-shadow .2s">
                        <button class="btn btn-primary" onclick="exportSenseis()" style="padding:8px 16px;font-size:0.85rem">💾 Save Changes</button>
                    </div>
                </div>
                <div class="item-list" id="senseiList"></div>
            </div>
        </div>

        <!-- Activities -->
        <div id="tab-activities" class="tab-panel">
            <div class="card">
                <h3>Add Activity</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Activity Name</label>
                        <input type="text" id="newActivityName" placeholder="e.g. Perfect Score">
                    </div>
                    <div class="form-group" style="max-width:150px">
                        <label>Code Coins</label>
                        <input type="number" id="newActivityCoins" placeholder="5" min="1">
                    </div>
                    <button class="btn btn-primary" onclick="addActivity()">+ Add Activity</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
                    <h3 style="margin-bottom:0">All Activities</h3>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                        <input type="text" id="activitySearch" placeholder="Search activities..." oninput="renderActivities()"
                               style="padding:8px 14px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color .2s,box-shadow .2s">
                        <button class="btn btn-primary" onclick="exportActivities()" style="padding:8px 16px;font-size:0.85rem">💾 Save Changes</button>
                    </div>
                </div>
                <div class="item-list" id="activityList"></div>
            </div>
        </div>

        <div class="footer">Keep the data clean, Sensei!</div>
    </div>
</div>

<div id="toast"></div>

<script>

    const PASSWORD = 'Milton123';
    function checkPassword() {
        const val = document.getElementById('pwdInput').value;
        if (val === PASSWORD) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('pageContent').style.display = 'block';
            renderAll();
        } else {
            const input = document.getElementById('pwdInput');
            document.getElementById('lockError').textContent = 'Wrong password! Try again.';
            input.classList.add('shake');
            input.value = '';
            setTimeout(() => input.classList.remove('shake'), 500);
        }
    }

    const LS = {
        get: k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };
    const genId = () => '_' + Math.random().toString(36).slice(2, 9);

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function switchTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
        renderAll();
    }

    function renderAll() {
        Promise.all([ensureNinjasLoaded(), ensureSenseisLoaded(), ensureActivitiesLoaded()]).then(() => {
            renderNinjas();
            renderSenseis();
            renderActivities();
        });
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function ensureNinjasLoaded() {
        if (localStorage.getItem('cc_ninjas_seeded')) return;
        try {
            const res  = await fetch('NinjaList.json');
            const data = await res.json();
            const ninjas = data.map(n => ({
                id:        genId(),
                fullName:  n['Ninja Full Name'] || '',
                shortName: n['Ninja'] || '',
                status:    n['Status'] || 'Active'
            }));
            LS.set('cc_ninjas', ninjas);
            localStorage.setItem('cc_ninjas_seeded', '1');
        } catch {
            if (!localStorage.getItem('cc_ninjas_seeded')) {
                LS.set('cc_ninjas', []);
                localStorage.setItem('cc_ninjas_seeded', '1');
            }
        }
    }

    let editingNinjaId = null;
    let ninjaStatusFilter = 'All';

    function setNinjaFilter(value) {
        ninjaStatusFilter = value;
        ['All', 'Active', 'Inactive'].forEach(v => {
            const btn = document.getElementById('filter' + v);
            if (!btn) return;
            const isActive = v === value;
            btn.style.background     = isActive ? 'var(--brand-600)' : '#fff';
            btn.style.color          = isActive ? '#fff' : '#64748B';
            btn.style.borderColor    = isActive ? 'var(--brand-500)' : '#DCE3E6';
        });
        renderNinjas();
    }

    function renderNinjas() {
        const ninjas = LS.get('cc_ninjas');
        const query  = (document.getElementById('ninjaSearch')?.value || '').trim().toLowerCase();
        const list   = ninjas.filter(n => {
            const matchSearch = !query || n.fullName.toLowerCase().includes(query) || n.shortName.toLowerCase().includes(query);
            const matchStatus = ninjaStatusFilter === 'All' || (n.status || 'Active') === ninjaStatusFilter;
            return matchSearch && matchStatus;
        });
        const el = document.getElementById('ninjaList');
        if (!list.length) { el.innerHTML = '<div class="empty-msg">No ninjas found...</div>'; return; }
        el.innerHTML = list.map(n => {
            if (n.id === editingNinjaId) {
                return `<div class="item-row" id="ninja-row-${n.id}">
                    <div style="display:flex;gap:8px;flex:1;flex-wrap:wrap">
                        <input id="edit-full-${n.id}" value="${escHtml(n.fullName)}" placeholder="Full Name"
                               style="padding:8px 12px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;flex:1;min-width:140px;outline:none">
                        <input id="edit-short-${n.id}" value="${escHtml(n.shortName)}" placeholder="Short Name"
                               style="padding:8px 12px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;flex:1;min-width:100px;outline:none">
                    </div>
                    <div style="display:flex;gap:6px;margin-left:10px">
                        <button class="btn btn-primary" style="padding:7px 14px;font-size:0.82rem" onclick="saveNinja('${n.id}')">✓ Save</button>
                        <button class="btn-danger" onclick="cancelNinjaEdit()">✕</button>
                    </div>
                </div>`;
            }
            const status = n.status || 'Active';
            const isActive = status === 'Active';
            const statusStyle = isActive
                ? 'background:rgba(18,197,154,0.15);border:1px solid rgba(18,197,154,0.35);color:#0FAE88;'
                : 'background:rgba(100,116,139,0.12);border:1px solid rgba(100,116,139,0.3);color:#64748B;';
            return `<div class="item-row" id="ninja-row-${n.id}">
                <div class="item-info">
                    <span class="item-name">🥷 ${escHtml(n.fullName)}</span>
                    <span class="item-sub">${escHtml(n.shortName)}</span>
                </div>
                <div style="display:flex;gap:6px;align-items:center">
                    <button onclick="toggleNinjaStatus('${n.id}')"
                            style="padding:7px 14px;font-size:0.82rem;font-weight:700;border-radius:var(--r-xl);cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s;${statusStyle}">${escHtml(status)}</button>
                    <button class="btn btn-primary" style="padding:7px 14px;font-size:0.82rem" onclick="startEditNinja('${n.id}')">✎ Edit</button>
                    <button class="btn-danger" onclick="deleteNinja('${n.id}')">🗑 Remove</button>
                </div>
            </div>`;
        }).join('');
    }

    function startEditNinja(id) {
        editingNinjaId = id;
        renderNinjas();
        document.getElementById('edit-full-' + id)?.focus();
    }

    function saveNinja(id) {
        const fullName  = document.getElementById('edit-full-' + id)?.value.trim();
        const shortName = document.getElementById('edit-short-' + id)?.value.trim();
        if (!fullName) { toast('Full name cannot be empty!'); return; }
        const ninjas = LS.get('cc_ninjas');
        const idx = ninjas.findIndex(n => n.id === id);
        if (idx !== -1) { ninjas[idx].fullName = fullName; ninjas[idx].shortName = shortName; }
        LS.set('cc_ninjas', ninjas);
        editingNinjaId = null;
        toast('Ninja updated!');
        renderNinjas();
    }

    function cancelNinjaEdit() {
        editingNinjaId = null;
        renderNinjas();
    }

    function toggleNinjaStatus(id) {
        const ninjas = LS.get('cc_ninjas');
        const idx = ninjas.findIndex(n => n.id === id);
        if (idx !== -1) {
            ninjas[idx].status = (ninjas[idx].status || 'Active') === 'Active' ? 'Inactive' : 'Active';
            LS.set('cc_ninjas', ninjas);
            renderNinjas();
        }
    }

    async function ensureSenseisLoaded() {
        if (localStorage.getItem('cc_senseis_seeded')) return;
        try {
            const res  = await fetch('SenseiList.json');
            const data = await res.json();
            const senseis = data.map(s => ({ id: genId(), name: s['Sensei'] || '' }));
            LS.set('cc_senseis', senseis);
            localStorage.setItem('cc_senseis_seeded', '1');
        } catch {
            if (!localStorage.getItem('cc_senseis_seeded')) {
                LS.set('cc_senseis', []);
                localStorage.setItem('cc_senseis_seeded', '1');
            }
        }
    }

    let editingSenseiId = null;

    function renderSenseis() {
        const senseis = LS.get('cc_senseis');
        const query   = (document.getElementById('senseiSearch')?.value || '').trim().toLowerCase();
        const list    = query ? senseis.filter(s => s.name.toLowerCase().includes(query)) : senseis;
        const el = document.getElementById('senseiList');
        if (!list.length) { el.innerHTML = '<div class="empty-msg">No senseis found...</div>'; return; }
        el.innerHTML = list.map(s => {
            if (s.id === editingSenseiId) {
                return `<div class="item-row" id="sensei-row-${s.id}">
                    <div style="display:flex;gap:8px;flex:1;flex-wrap:wrap">
                        <input id="edit-sensei-${s.id}" value="${escHtml(s.name)}" placeholder="Sensei Name"
                               style="padding:8px 12px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;flex:1;min-width:140px;outline:none">
                    </div>
                    <div style="display:flex;gap:6px;margin-left:10px">
                        <button class="btn btn-primary" style="padding:7px 14px;font-size:0.82rem" onclick="saveSensei('${s.id}')">✓ Save</button>
                        <button class="btn-danger" onclick="cancelSenseiEdit()">✕</button>
                    </div>
                </div>`;
            }
            return `<div class="item-row" id="sensei-row-${s.id}">
                <div class="item-info">
                    <span class="item-name">🥋 ${escHtml(s.name)}</span>
                </div>
                <div style="display:flex;gap:6px">
                    <button class="btn btn-primary" style="padding:7px 14px;font-size:0.82rem" onclick="startEditSensei('${s.id}')">✎ Edit</button>
                    <button class="btn-danger" onclick="deleteSensei('${s.id}')">🗑 Remove</button>
                </div>
            </div>`;
        }).join('');
    }

    function startEditSensei(id) {
        editingSenseiId = id;
        renderSenseis();
        document.getElementById('edit-sensei-' + id)?.focus();
    }

    function saveSensei(id) {
        const name = document.getElementById('edit-sensei-' + id)?.value.trim();
        if (!name) { toast('Sensei name cannot be empty!'); return; }
        const senseis = LS.get('cc_senseis');
        const idx = senseis.findIndex(s => s.id === id);
        if (idx !== -1) senseis[idx].name = name;
        LS.set('cc_senseis', senseis);
        editingSenseiId = null;
        toast('Sensei updated!');
        renderSenseis();
    }

    function cancelSenseiEdit() {
        editingSenseiId = null;
        renderSenseis();
    }

    async function ensureActivitiesLoaded() {
        if (localStorage.getItem('cc_activities_seeded')) return;
        try {
            const res  = await fetch('EarnPointsList.json');
            const data = await res.json();
            const activities = data.map(a => ({ id: genId(), name: a['Activity'] || '', coins: parseInt(a['Code Coins']) || 0 }));
            LS.set('cc_activities', activities);
            localStorage.setItem('cc_activities_seeded', '1');
        } catch {
            if (!localStorage.getItem('cc_activities_seeded')) {
                LS.set('cc_activities', []);
                localStorage.setItem('cc_activities_seeded', '1');
            }
        }
    }

    let editingActivityId = null;

    function renderActivities() {
        const activities = LS.get('cc_activities');
        const query = (document.getElementById('activitySearch')?.value || '').trim().toLowerCase();
        const list  = query ? activities.filter(a => a.name.toLowerCase().includes(query)) : activities;
        const el = document.getElementById('activityList');
        if (!list.length) { el.innerHTML = '<div class="empty-msg">No activities found...</div>'; return; }
        el.innerHTML = list.map(a => {
            if (a.id === editingActivityId) {
                return `<div class="item-row" id="activity-row-${a.id}">
                    <div style="display:flex;gap:8px;flex:1;flex-wrap:wrap;align-items:center">
                        <input id="edit-activity-name-${a.id}" value="${escHtml(a.name)}" placeholder="Activity Name"
                               style="padding:8px 12px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;flex:1;min-width:180px;outline:none">
                        <input id="edit-activity-coins-${a.id}" value="${a.coins}" placeholder="Coins" type="number" min="1"
                               style="padding:8px 12px;border:1px solid #DCE3E6;border-radius:var(--r-xl);font-family:'Nunito Sans',sans-serif;font-size:0.9rem;width:90px;outline:none">
                    </div>
                    <div style="display:flex;gap:6px;margin-left:10px">
                        <button class="btn btn-primary" style="padding:7px 14px;font-size:0.82rem" onclick="saveActivity('${a.id}')">✓ Save</button>
                        <button class="btn-danger" onclick="cancelActivityEdit()">✕</button>
                    </div>
                </div>`;
            }
            return `<div class="item-row" id="activity-row-${a.id}">
                <div style="display:flex;align-items:center;gap:10px;flex:1">
                    <span class="points-pill">💰 ${a.coins}</span>
                    <div class="item-info"><span class="item-name">${escHtml(a.name)}</span></div>
                </div>
                <div style="display:flex;gap:6px">
                    <button class="btn btn-primary" style="padding:7px 14px;font-size:0.82rem" onclick="startEditActivity('${a.id}')">✎ Edit</button>
                    <button class="btn-danger" onclick="deleteActivity('${a.id}')">🗑 Remove</button>
                </div>
            </div>`;
        }).join('');
    }

    function startEditActivity(id) {
        editingActivityId = id;
        renderActivities();
        document.getElementById('edit-activity-name-' + id)?.focus();
    }

    function saveActivity(id) {
        const name  = document.getElementById('edit-activity-name-' + id)?.value.trim();
        const coins = parseInt(document.getElementById('edit-activity-coins-' + id)?.value, 10);
        if (!name)             { toast('Activity name cannot be empty!'); return; }
        if (!coins || coins < 1) { toast('Enter a valid coin value!'); return; }
        const activities = LS.get('cc_activities');
        const idx = activities.findIndex(a => a.id === id);
        if (idx !== -1) { activities[idx].name = name; activities[idx].coins = coins; }
        LS.set('cc_activities', activities);
        editingActivityId = null;
        toast('Activity updated!');
        renderActivities();
    }

    function cancelActivityEdit() {
        editingActivityId = null;
        renderActivities();
    }

    function addNinja() {
        const fullName  = document.getElementById('newNinjaFullName').value.trim();
        const shortName = document.getElementById('newNinjaShortName').value.trim();
        if (!fullName) { toast('Enter a full name!'); return; }
        const ninjas = LS.get('cc_ninjas');
        ninjas.push({ id: genId(), fullName, shortName, status: 'Active' });
        LS.set('cc_ninjas', ninjas);
        document.getElementById('newNinjaFullName').value  = '';
        document.getElementById('newNinjaShortName').value = '';
        toast('Ninja added!');
        renderNinjas();
    }

    function deleteNinja(id) {
        if (!confirm('Remove this ninja?')) return;
        LS.set('cc_ninjas', LS.get('cc_ninjas').filter(n => n.id !== id));
        toast('Ninja removed.');
        renderNinjas();
    }

    function exportNinjas() {
        const ninjas = LS.get('cc_ninjas');
        const out = ninjas.map(n => ({ 'Ninja Full Name': n.fullName, 'Ninja': n.shortName, 'Status': n.status || 'Active' }));
        const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'NinjaList.json';
        a.click();
        URL.revokeObjectURL(a.href);
        toast('NinjaList.json downloaded!');
    }

    function addSensei() {
        const name = document.getElementById('newSenseiName').value.trim();
        if (!name) { toast('Enter a sensei name!'); return; }
        const senseis = LS.get('cc_senseis');
        senseis.push({ id: genId(), name });
        LS.set('cc_senseis', senseis);
        document.getElementById('newSenseiName').value = '';
        toast('Sensei added!');
        renderSenseis();
    }

    function deleteSensei(id) {
        if (!confirm('Remove this sensei?')) return;
        LS.set('cc_senseis', LS.get('cc_senseis').filter(s => s.id !== id));
        toast('Sensei removed.');
        renderSenseis();
    }

    function exportSenseis() {
        const senseis = LS.get('cc_senseis');
        const out  = senseis.map(s => ({ 'Sensei': s.name }));
        const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = 'SenseiList.json';
        a.click();
        URL.revokeObjectURL(a.href);
        toast('SenseiList.json downloaded!');
    }

    function addActivity() {
        const name  = document.getElementById('newActivityName').value.trim();
        const coins = parseInt(document.getElementById('newActivityCoins').value, 10);
        if (!name)             { toast('Enter an activity name!'); return; }
        if (!coins || coins < 1) { toast('Enter a valid coin value!'); return; }
        const activities = LS.get('cc_activities');
        activities.push({ id: genId(), name, coins });
        LS.set('cc_activities', activities);
        document.getElementById('newActivityName').value  = '';
        document.getElementById('newActivityCoins').value = '';
        toast('Activity added!');
        renderActivities();
    }

    function deleteActivity(id) {
        if (!confirm('Remove this activity?')) return;
        LS.set('cc_activities', LS.get('cc_activities').filter(a => a.id !== id));
        toast('Activity removed.');
        renderActivities();
    }

    function exportActivities() {
        const activities = LS.get('cc_activities');
        const out  = activities.map(a => ({ 'Activity': a.name, 'Code Coins': String(a.coins) }));
        const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = 'EarnPointsList.json';
        a.click();
        URL.revokeObjectURL(a.href);
        toast('EarnPointsList.json downloaded!');
    }

</script>
</body>
</html>
