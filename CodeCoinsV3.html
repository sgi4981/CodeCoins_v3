<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCoins V3 — Sneak Peek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700;900&family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand-600: #156EB5;
            --brand-700: #125C96;
            --brand-800: #0F4B79;
            --brand-900: #0D2B45;
            --accent-400: #33D8AF;
            --accent-500: #12C59A;
            --accent-600: #0FAE88;
            --neutral-50:  #F6F8F8;
            --neutral-200: #DCE3E6;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 65% 35%, #001a3d 0%, #000d1c 45%, #000000 100%);
            font-family: 'Nunito Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Sneak peek badge ── */
        .sneak-badge {
            display: inline-block;
            background: rgba(0, 80, 200, 0.25);
            border: 1px solid rgba(50, 140, 255, 0.45);
            color: #80c0ff;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 7px 20px;
            border-radius: 999px;
            margin-bottom: 32px;
            animation: fadeSlideDown 1s ease both;
        }

        /* ── Main title ── */
        .title {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.03em;
            animation: fadeSlideDown 1s 0.15s ease both;
        }

        .title .word-code {
            font-size: clamp(4.5rem, 13vw, 10rem);
            color: #ffffff;
            text-shadow: 0 0 60px rgba(0, 100, 255, 0.35);
            display: block;
        }

        .title .word-coins {
            font-size: clamp(4.5rem, 13vw, 10rem);
            color: #ffffff;
            text-shadow: 0 0 60px rgba(0, 100, 255, 0.35);
            display: block;
        }

        .title .version {
            font-size: clamp(2.5rem, 8vw, 6rem);
            background: linear-gradient(135deg, #156EB5, #50a8ff, #00cfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-top: 4px;
        }

        /* ── Coming soon ── */
        .coming-soon {
            margin-top: 22px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 700;
            animation: fadeSlideDown 1s 0.3s ease both;
        }

        /* ── Teaser card ── */
        .teaser {
            margin-top: 30px;
            max-width: 460px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.75;
            border: 1px solid rgba(50, 130, 255, 0.25);
            background: rgba(0, 30, 80, 0.3);
            border-radius: 18px;
            padding: 20px 28px;
            backdrop-filter: blur(12px);
            animation: fadeSlideDown 1s 0.45s ease both;
        }

        .teaser strong {
            color: #80c0ff;
            font-weight: 800;
        }

        /* ── Sneak peek button ── */
        .sneak-btn {
            margin-top: 36px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 36px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: #ffffff;
            background: linear-gradient(135deg, #156EB5, #00cfff);
            box-shadow: 0 0 28px rgba(0, 150, 255, 0.45);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            animation: fadeSlideDown 1s 0.6s ease both;
            text-decoration: none;
        }
        .sneak-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 44px rgba(0, 180, 255, 0.65);
        }
        .sneak-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* ── Pulsing dots ── */
        .dots {
            margin-top: 32px;
            display: flex;
            gap: 10px;
            animation: fadeSlideDown 1s 0.75s ease both;
        }

        .dots span {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(50, 130, 255, 0.4);
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.25s; }
        .dots span:nth-child(3) { animation-delay: 0.5s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.25; transform: scale(0.8); }
            50%       { opacity: 1;    transform: scale(1.3); background: #80c0ff; }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<canvas id="swirlCanvas"></canvas>

<div class="content">
    <div class="sneak-badge">✦ &nbsp; Launching on June 1st &nbsp; ✦</div>

    <div class="title">
        <span class="word-code">Code</span>
        <span class="word-coins">Coins</span>
        <span class="version">Version 3</span>
    </div>

    <div class="coming-soon">Coming Soon</div>

    <a href="leaderboard.html" class="sneak-btn">
        &#128064;&nbsp; Sneak Peek the Leaderboard
    </a>

    <div class="dots">
        <span></span><span></span><span></span>
    </div>
</div>

<script>
    const canvas = document.getElementById('swirlCanvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a, b) { return a + Math.random() * (b - a); }

    class Swirl {
        constructor(stagger) { this.init(stagger); }

        init(stagger) {
            this.x          = rand(0, canvas.width);
            this.y          = rand(0, canvas.height);
            this.maxRadius  = rand(40, 170);
            this.radius     = stagger ? rand(0, this.maxRadius) : 0;
            this.turns      = rand(2, 5.5);
            this.hue        = rand(200, 240);    // blue → deep blue
            this.sat        = rand(70, 100);
            this.light      = rand(45, 72);
            this.peakOp     = rand(0.25, 0.65);
            this.opacity    = stagger ? rand(0, this.peakOp) : 0;
            this.phase      = stagger && Math.random() > 0.4 ? 'hold' : 'in';
            this.growSpeed  = rand(0.35, 1.1);
            this.lineWidth  = rand(0.7, 2.4);
            this.rotation   = rand(0, Math.PI * 2);
            this.rotSpeed   = rand(-0.007, 0.007);
            this.holdTimer  = 0;
            this.holdMax    = rand(80, 220);
            this.fadeSpeed  = rand(0.006, 0.018);
        }

        draw() {
            if (this.opacity < 0.005) return;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.globalAlpha  = this.opacity;
            ctx.strokeStyle  = `hsl(${this.hue},${this.sat}%,${this.light}%)`;
            ctx.lineWidth    = this.lineWidth;
            ctx.lineCap      = 'round';
            ctx.shadowColor  = `hsl(${this.hue},${this.sat}%,${this.light}%)`;
            ctx.shadowBlur   = 8;

            const steps      = 220;
            const totalAngle = this.turns * Math.PI * 2;
            ctx.beginPath();
            for (let i = 0; i <= steps; i++) {
                const t     = i / steps;
                const angle = t * totalAngle;
                const r     = t * this.radius;
                const x     = Math.cos(angle) * r;
                const y     = Math.sin(angle) * r;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        update() {
            this.rotation += this.rotSpeed;

            if (this.phase === 'in') {
                this.opacity = Math.min(this.peakOp, this.opacity + 0.012);
                this.radius  = Math.min(this.maxRadius, this.radius + this.growSpeed);
                if (this.radius >= this.maxRadius && this.opacity >= this.peakOp * 0.95)
                    this.phase = 'hold';
            } else if (this.phase === 'hold') {
                if (++this.holdTimer >= this.holdMax) this.phase = 'out';
            } else {
                this.opacity -= this.fadeSpeed;
                if (this.opacity <= 0) this.init(false);
            }
        }
    }

    const COUNT  = 20;
    const swirls = Array.from({ length: COUNT }, (_, i) => new Swirl(i < 14));

    (function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        swirls.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(animate);
    })();
</script>

</body>
</html>
