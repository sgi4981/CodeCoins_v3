<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCoins — Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --brand-500: #328AB5;
            --brand-600: #156EB5;
            --brand-700: #125C96;
            --brand-800: #0F4B79;
            --brand-900: #0D2B45;
            --accent-400: #33D8AF;
            --accent-500: #12C59A;
            --accent-600: #0FAE88;
            --neutral-50:  #F6F8F8;
            --neutral-200: #DCE3E6;
            --neutral-400: #AAB4BC;
            --neutral-600: #64748B;
            --shadow-hero:   0 20px 40px rgba(0,0,0,0.25);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --r-xl:  0.75rem;
            --r-2xl: 1rem;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 65% 35%, #001a3d 0%, #000d1c 45%, #000000 100%);
            font-family: 'Nunito Sans', sans-serif;
            color: #ffffff;
        }

        canvas#swirlCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #floating-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .float-icon {
            position: absolute;
            animation: floatUp linear infinite;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh)  translateX(0px)   rotate(0deg);   opacity: 0; }
            8%   { opacity: 1; }
            25%  { transform: translateY(72vh)   translateX(18px)  rotate(90deg); }
            50%  { transform: translateY(48vh)   translateX(-14px) rotate(180deg); }
            75%  { transform: translateY(24vh)   translateX(16px)  rotate(270deg); }
            92%  { opacity: 0.35; }
            100% { transform: translateY(-120px) translateX(0px)   rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1100px;
            height: 100vh;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header { text-align: center; padding: 16px 0 10px; }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2rem, 4.5vw, 3.2rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header .subtitle {
            color: var(--accent-600);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 12px;
        }

        /* ── Divider ── */
        .mc-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(127,196,255,0.3), transparent);
            margin: 10px 0;
        }

        /* ── Fun Fact Bar ── */
        .fun-fact-bar {
            background: #7ed957;
            border: 1.5px solid #66be3e;
            border-left: 4px solid #0D2B45;
            border-radius: var(--r-xl);
            padding: 16px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 10px rgba(21,110,181,0.07);
        }
        .fun-fact-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0D2B45;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .fun-fact-text {
            font-size: 0.82rem;
            color: #0D2B45;
            font-style: italic;
            line-height: 1.4;
        }

        /* ── Nav ── */
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .nav a {
            padding: 10px 24px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            color: #64748B;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            box-shadow: 0 1px 3px rgba(13,43,69,0.06);
            transition: all 0.2s var(--ease);
        }

        .nav a.active, .nav a:hover {
            background: var(--brand-600);
            border-color: var(--brand-500);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.4);
        }

        /* ── Search ── */
        .leaderboard-side {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            .container { height: auto; overflow: visible; }
            .leaderboard-side { overflow-y: visible; }
        }

        .search-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .search-wrap input {
            flex: 1;
            padding: 12px 18px;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 1px 3px rgba(13,43,69,0.06);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-wrap input::placeholder { color: #AAB4BC; }
        .search-wrap input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.2);
        }

        .btn {
            padding: 12px 22px;
            border: none;
            cursor: pointer;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: var(--r-xl);
            transition: all 0.2s var(--ease);
        }

        .btn-primary {
            background: var(--brand-600);
            color: #FFF;
            box-shadow: 0 4px 14px rgba(21,110,181,0.35);
        }

        .btn-primary:hover {
            background: var(--brand-700);
            box-shadow: 0 6px 20px rgba(21,110,181,0.5);
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(0); }


        /* ── Table ── */
        .table-wrap {
            background: #156EB5;
            border: 2px solid #156EB5;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.08);
            overflow: clip;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; }

        thead {
            background: #0F4B79;
        }

        th {
            padding: 7px 14px;
            position: sticky;
            top: 0;
            background: #0F4B79;
            z-index: 10;
            box-shadow: 0 1px 0 rgba(255,255,255,0.15);
            text-align: left;
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        td {
            padding: 4px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.82rem;
            color: #FFFFFF;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.08); }

        tbody tr.search-hit {
            background: rgba(255,255,255,0.15) !important;
            box-shadow: inset 4px 0 0 var(--accent-400);
        }

        /* rank */
        .rank { text-align: center; width: 48px; font-size: 0.95rem; }
        .rank-1 { color: #FBBF24; filter: drop-shadow(0 0 8px rgba(251,191,36,0.5)); animation: goldBounce 1.5s ease-in-out infinite; }
        .rank-2 { color: #CBD5E1; }
        .rank-3 { color: #D97706; }
        .rank-num { font-family: 'Poppins', sans-serif; font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.5); }

        @keyframes goldBounce {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-4px); }
        }

        /* badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-current  { background: rgba(255,255,255,0.18); color: #FFFFFF; }
        .badge-earned   { background: rgba(255,255,255,0.18); color: #FFFFFF; }
        .badge-redeemed { background: rgba(255,255,255,0.18); color: #FFFFFF; }
        .badge-earned   .arr { color: #4ADE80; }
        .badge-redeemed .arr { color: #FF6B6B; }

        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: #AAB4BC;
            font-size: 0.95rem;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: #AAB4BC;
            font-size: 0.85rem;
        }

        /* ── Star access button ── */
        .star-btn {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            box-shadow: 0 4px 14px rgba(13,43,69,0.12);
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease);
        }

        .star-btn:hover {
            box-shadow: 0 6px 20px rgba(13,43,69,0.2);
            transform: scale(1.05);
        }
        .star-btn .bar {
            display: block;
            width: 20px;
            height: 2px;
            background: #156EB5;
            border-radius: 2px;
            margin: 3px 0;
            transition: background 0.2s;
        }

        /* ── Star dropdown menu ── */
        .star-menu {
            position: fixed;
            top: 74px;
            right: 24px;
            z-index: 200;
            background: #FFFFFF;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-2xl);
            box-shadow: 0 10px 30px rgba(13,43,69,0.15);
            padding: 20px;
            width: 260px;
            animation: menuSlide 0.18s var(--ease);
        }

        .star-menu.hidden { display: none; }

        @keyframes menuSlide {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        .star-menu-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .role-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s var(--ease);
            text-align: left;
        }

        .role-btn:last-child { margin-bottom: 0; }

        .role-btn:hover {
            background: var(--brand-600);
            border-color: var(--brand-600);
            color: #FFF;
        }

        .star-pwd-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--brand-900);
            margin-bottom: 12px;
        }

        .star-pwd-input {
            width: 100%;
            padding: 10px 14px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            color: #1E293B;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            margin-bottom: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .star-pwd-input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(18,197,154,0.18);
        }

        .star-pwd-input.shake { animation: shake 0.35s ease; border-color: #EF4444; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-6px); }
            40%,80% { transform: translateX(6px); }
        }

        .star-error {
            color: #DC2626;
            font-size: 0.82rem;
            font-weight: 600;
            min-height: 18px;
            margin-bottom: 10px;
        }

        .star-actions {
            display: flex;
            gap: 8px;
        }

        .star-back-btn {
            padding: 9px 14px;
            background: #F6F8F8;
            border: 1px solid #DCE3E6;
            border-radius: var(--r-xl);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748B;
            cursor: pointer;
            transition: all 0.15s;
        }

        .star-back-btn:hover { background: #EEF2F3; }
    </style>
</head>
<body>
<canvas id="swirlCanvas"></canvas>
<div id="floating-bg"></div>

<!-- Star access button -->
<button class="star-btn" id="starBtn" onclick="toggleStarMenu(event)" title="Admin / Staff access">
    <span style="display:flex;flex-direction:column;align-items:center;">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </span>
</button>

<!-- Star dropdown menu -->
<div class="star-menu hidden" id="starMenu">
    <div class="star-menu-title">Access Panel</div>
    <button class="role-btn" onclick="window.location.href='admin.html'">⚙️ Admin</button>
    <button class="role-btn" onclick="window.location.href='staff.html'">📜 Staff</button>
</div>

<div class="container">
    <div class="header">
        <h1>⛏ CodeCoins ⛏</h1>
    </div>

    <div class="mc-divider"></div>

    <div class="fun-fact-bar">
        <span class="fun-fact-label">💡 Fun Fact</span>
        <span class="fun-fact-text" id="funFactText"></span>
    </div>

    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search player name..." oninput="renderLeaderboard()">
        <button class="btn btn-primary" onclick="renderLeaderboard()">Search</button>
    </div>

    <div class="leaderboard-side">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:center">Rank</th>
                        <th>Player Name</th>
                        <th>💰 Coins</th>
                        <th>⬆ Total Earned</th>
                        <th>⬇ Total Redeemed</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    async function loadFloatIcons() {
        try {
            const res = await fetch('Assets/FloatingIconAssets/');
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const imgs = [...doc.querySelectorAll('a[href]')]
                .map(a => a.getAttribute('href'))
                .filter(h => /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(h))
                .map(h => 'Assets/FloatingIconAssets/' + h.replace(/^.*\//, ''));
            if (imgs.length) return imgs;
        } catch (_) {}
        return ['Assets/FloatingIconAssets/Mahad1.png', 'Assets/FloatingIconAssets/Mahad2.png'];
    }
    let leaderRows = [];

    async function createFloaters() {
        const icons = await loadFloatIcons();
        const bg = document.getElementById('floating-bg');
        for (let i = 0; i < 30; i++) {
            const el = document.createElement('img');
            el.className = 'float-icon';
            el.src = icons[Math.floor(Math.random() * icons.length)];
            el.alt = '';
            el.style.cssText = `
                left: ${Math.random() * 100}vw;
                width: ${Math.random() * 24 + 32}px;
                animation-duration: ${Math.random() * 20 + 32}s;
                animation-delay: ${Math.random() * 22}s;
                opacity: ${Math.random() * 0.28 + 0.1};
            `;
            bg.appendChild(el);
        }
    }

    async function fetchLeaderboard() {
        document.getElementById('leaderboardBody').innerHTML =
            `<tr><td colspan="5" class="no-data">Loading leaderboard...</td></tr>`;
        try {
            const safeJson = async (url) => {
                const r = await fetch(url, { cache: 'no-cache' });
                if (!r.ok) throw new Error(`${url} returned HTTP ${r.status}`);
                return r.json();
            };
            const [transactions, ninjas] = await Promise.all([
                safeJson('/api/transactions'),
                safeJson('/api/ninjas?activeOnly=1'),
            ]);
            // Map fullName → canonical fullName for active ninjas
            const ninjaCanonical = {};
            ninjas
                .filter(n => (n.status || 'Active') === 'Active')
                .forEach(n => {
                    const canonical = (n.fullName || '').trim();
                    if (!canonical) return;
                    ninjaCanonical[canonical.toLowerCase()] = canonical;
                });
            const map = {};
            transactions.forEach(t => {
                const rawName = t.ninja || t['Ninja Name'] || '';
                if (!rawName) return;
                const canonical = ninjaCanonical[rawName.trim().toLowerCase()];
                if (!canonical) return;
                if (!map[canonical]) map[canonical] = { name: canonical, earned: 0, redeemed: 0 };
                map[canonical].earned   += parseInt(t.pointsEarned   || t['Points Earned'])   || 0;
                map[canonical].redeemed += parseInt(t.pointsRedeemed || t['Points Redeemed']) || 0;
            });
            leaderRows = Object.values(map)
                .map(r => ({ ...r, coins: r.earned - r.redeemed }))
                .sort((a, b) => b.coins - a.coins)
                .map((r, i) => ({ ...r, rank: i + 1 }));
            renderLeaderboard();
        } catch (err) {
            document.getElementById('leaderboardBody').innerHTML =
                `<tr><td colspan="5" class="no-data">Could not load data: ${err?.message || err}</td></tr>`;
        }
    }

    function renderLeaderboard() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        if (!leaderRows.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="no-data">No players found...</td></tr>`;
            return;
        }

        leaderRows.forEach(r => {
            const isHit = query && r.name.toLowerCase().includes(query);
            const rankDisplay =
                r.rank === 1 ? `<span class="rank rank-1">🥇</span>` :
                r.rank === 2 ? `<span class="rank rank-2">🥈</span>` :
                r.rank === 3 ? `<span class="rank rank-3">🥉</span>` :
                `<span class="rank rank-num">#${r.rank}</span>`;
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="${isHit ? 'search-hit' : ''}">
                    <td style="text-align:center">${rankDisplay}</td>
                    <td style="font-size:0.85rem;text-shadow:1px 1px #000">${r.name}</td>
                    <td><span class="badge badge-current">${r.coins < 0 ? '-' : '💰 ' + r.coins}</span></td>
                    <td><span class="badge badge-earned">${r.coins < 0 ? '-' : '<span class="arr">⬆</span> ' + r.earned}</span></td>
                    <td><span class="badge badge-redeemed">${r.coins < 0 ? '-' : '<span class="arr">⬇</span> ' + r.redeemed}</span></td>
                </tr>`);
        });

        if (query) {
            const firstHit = tbody.querySelector('.search-hit');
            if (firstHit) firstHit.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    createFloaters();
    fetchLeaderboard();

    /* ── Daily coding fun fact ── */
    (function() {
        const facts = [
            "The first computer bug was an actual bug — a moth found trapped in a Harvard Mark II computer in 1947.",
            "Python was named after Monty Python's Flying Circus, not the snake.",
            "There are over 700 programming languages in existence today.",
            "JavaScript was created in just 10 days by Brendan Eich in 1995.",
            "The term 'debugging' became popular after Grace Hopper removed that moth from the Mark II.",
            "HTML is not technically a programming language — it's a markup language.",
            "The first computer game, Spacewar!, was created in 1962 at MIT.",
            "Linux powers over 96% of the world's top 1 million web servers.",
            "Git was created by Linus Torvalds in just two weeks in 2005.",
            "A typical smartphone today has more computing power than all of NASA had in 1969.",
            "Stack Overflow is visited by over 50 million developers every month.",
            "The 'Hello, World!' program dates back to a 1978 book on the C programming language.",
            "Binary code uses only two digits — 0 and 1 — to represent all data.",
            "The word 'pixel' is a combination of 'picture' and 'element'.",
            "The first 1GB hard drive, released in 1980, weighed over 500 pounds and cost $40,000.",
            "An estimated 4 billion people use software you didn't realize was code — like traffic lights.",
            "Over 90% of the world's currency exists only as digital data, not physical money.",
            "The @ symbol used in email addresses dates back to medieval accounting.",
            "NASA's Apollo 11 guidance computer had less memory than a modern greeting card.",
            "The world's first website, created by Tim Berners-Lee in 1991, is still online.",
            "Google's Founders Used Python from the Start.",
            "Rubber duck debugging — explaining your code to a rubber duck — actually works.",
            "A computer would need to run for thousands of years to crack 256-bit encryption.",
            "The first computer mouse was made of wood.",
            "ENIAC Was Operated by Six Women in 1945 during World War II.",
            "Coding is now a required subject in schools in over 20 countries worldwide.",
            "The word 'computer' originally referred to a person who performed calculations.",
            "There are more lines of code in a modern car than in a Boeing 787 aircraft.",
            "CAPTCHA Tests, which helps distinguish humans from computers, are Based on the Turing Test.",
            "The World's First Website 'http://info.cern.ch' Still Exists.",
            "The '#' symbol in programming is called an 'octothorpe'.",
            "Google's first ever server was built with LEGO bricks.",
        ];
        const d = new Date();
        const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
        document.getElementById('funFactText').textContent = facts[dayOfYear % facts.length];
    })();

    /* ── Star access menu ── */
    function toggleStarMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('starMenu');
        menu.classList.toggle('hidden');
    }

    document.addEventListener('click', e => {
        const menu = document.getElementById('starMenu');
        const btn  = document.getElementById('starBtn');
        if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.add('hidden');
        }
    });

    /* ── Swirl canvas (matches CodeCoinsV3 background) ── */
    (function() {
        const canvas = document.getElementById('swirlCanvas');
        const ctx    = canvas.getContext('2d');

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function rand(a, b) { return a + Math.random() * (b - a); }

        class Swirl {
            constructor(stagger) { this.init(stagger); }
            init(stagger) {
                this.x         = rand(0, canvas.width);
                this.y         = rand(0, canvas.height);
                this.maxRadius = rand(40, 170);
                this.radius    = stagger ? rand(0, this.maxRadius) : 0;
                this.turns     = rand(2, 5.5);
                this.hue       = rand(200, 240);
                this.sat       = rand(70, 100);
                this.light     = rand(45, 72);
                this.peakOp    = rand(0.25, 0.65);
                this.opacity   = stagger ? rand(0, this.peakOp) : 0;
                this.phase     = stagger && Math.random() > 0.4 ? 'hold' : 'in';
                this.growSpeed = rand(0.35, 1.1);
                this.lineWidth = rand(0.7, 2.4);
                this.rotation  = rand(0, Math.PI * 2);
                this.rotSpeed  = rand(-0.007, 0.007);
                this.holdTimer = 0;
                this.holdMax   = rand(80, 220);
                this.fadeSpeed = rand(0.006, 0.018);
            }
            draw() {
                if (this.opacity < 0.005) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.strokeStyle = `hsl(${this.hue},${this.sat}%,${this.light}%)`;
                ctx.lineWidth   = this.lineWidth;
                ctx.lineCap     = 'round';
                ctx.shadowColor = `hsl(${this.hue},${this.sat}%,${this.light}%)`;
                ctx.shadowBlur  = 8;
                const steps = 220, totalAngle = this.turns * Math.PI * 2;
                ctx.beginPath();
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps, angle = t * totalAngle, r = t * this.radius;
                    i === 0 ? ctx.moveTo(Math.cos(angle)*r, Math.sin(angle)*r)
                            : ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
                }
                ctx.stroke();
                ctx.restore();
            }
            update() {
                this.rotation += this.rotSpeed;
                if (this.phase === 'in') {
                    this.opacity = Math.min(this.peakOp, this.opacity + 0.012);
                    this.radius  = Math.min(this.maxRadius, this.radius + this.growSpeed);
                    if (this.radius >= this.maxRadius && this.opacity >= this.peakOp * 0.95) this.phase = 'hold';
                } else if (this.phase === 'hold') {
                    if (++this.holdTimer >= this.holdMax) this.phase = 'out';
                } else {
                    this.opacity -= this.fadeSpeed;
                    if (this.opacity <= 0) this.init(false);
                }
            }
        }

        const swirls = Array.from({ length: 20 }, (_, i) => new Swirl(i < 14));
        (function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            swirls.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        })();
    })();
</script>
</body>
</html>
